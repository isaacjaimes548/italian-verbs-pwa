<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Italian Verbs Quiz</title>
  <meta name="theme-color" content="#6f55d9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Italian Quiz">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <style>
    :root {
      --bg-start: #5f79e3;
      --bg-mid: #7256ce;
      --bg-end: #60459d;
      --panel: #f4f5f7;
      --text: #17324d;
      --muted: #7d8ca1;
      --white: #ffffff;
      --green: #2ed573;
      --red: #ff5f57;
      --yellow: #ffd84a;
      --border: #d6dbe4;
      --shadow: 0 16px 40px rgba(37, 24, 77, 0.18);
      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 52%, var(--bg-end) 100%);
    }

    body { padding: 22px; }

    button { font: inherit; }

    .app-shell {
      width: min(820px, 100%);
      margin: 0 auto;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      background: var(--panel);
      min-height: calc(100vh - 44px);
    }

    .hero {
      padding: 34px 30px 24px;
      text-align: center;
      color: white;
      background: linear-gradient(90deg, #6783eb 0%, #8450bb 100%);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 14px 0 0;
      font-size: 1.1rem;
      opacity: 0.96;
    }

    .hero-separator {
      margin-top: 18px;
      height: 7px;
      width: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #34e47a 0%, #28d66f 100%);
    }

    .content { padding: 28px 24px 34px; }

    .mode-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-top: 8px;
    }

    .mode-card {
      border: none;
      border-radius: 16px;
      color: white;
      text-align: center;
      padding: 26px 20px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(37, 24, 77, 0.14);
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .mode-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(37, 24, 77, 0.18);
      filter: brightness(1.02);
    }

    .mode-card .title {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .mode-card .subtitle {
      font-size: 1rem;
      font-weight: 600;
      opacity: 0.95;
    }

    .gradient-present { background: linear-gradient(90deg, #6880eb 0%, #7d53bb 100%); }
    .gradient-past { background: linear-gradient(90deg, #df88e9 0%, #f55572 100%); }
    .gradient-future { background: linear-gradient(90deg, #56a4ea 0%, #18d6df 100%); }
    .gradient-random { background: linear-gradient(90deg, #f685af 0%, #f9d73b 100%); }

    .quiz-topbar { display: none; }
    .quiz-topbar.active { display: block; }

    .stats-panel {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: rgba(255,255,255,0.14);
      border-radius: 12px;
      padding: 14px 10px;
      color: white;
      text-align: center;
      margin-bottom: 14px;
    }

    .stat-label { font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; }
    .stat-value { font-size: clamp(1.65rem, 4vw, 2.2rem); font-weight: 800; line-height: 1; }
    .stat-value.correct { color: var(--green); }
    .stat-value.incorrect { color: var(--red); }
    .stat-value.progress { color: var(--yellow); }

    .progress-track {
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.22);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #34e47a 0%, #44f2da 100%);
      transition: width .25s ease;
    }

    .quiz-panel { display: none; }
    .quiz-panel.active { display: block; }

    .question-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 30px 24px;
      text-align: center;
      margin-bottom: 26px;
    }

    .question-label {
      font-size: 1rem;
      color: #70839a;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .verb-text {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.3rem);
      font-weight: 800;
      font-style: italic;
      letter-spacing: -0.03em;
    }

    .options { display: flex; flex-direction: column; gap: 14px; }

    .option-btn, .back-btn, .primary-btn {
      width: 100%;
      border-radius: 10px;
      border: 1.5px solid #cfd6e0;
      background: transparent;
      color: var(--text);
      padding: 15px 16px;
      text-align: left;
      font-size: 1.15rem;
      transition: all .18s ease;
    }

    .option-btn:hover:not(:disabled), .back-btn:hover, .primary-btn:hover {
      border-color: #7a78f2;
      box-shadow: 0 6px 16px rgba(91, 76, 201, 0.08);
      transform: translateY(-1px);
    }

    .option-btn:disabled { cursor: default; }
    .option-btn.correct { background: rgba(46, 213, 115, 0.14); border-color: #2ed573; color: #197441; font-weight: 700; }
    .option-btn.incorrect { background: rgba(255, 95, 87, 0.12); border-color: #ff5f57; color: #b5302a; font-weight: 700; }

    .back-btn {
      margin-top: 22px;
      text-align: center;
      color: #6a6ef0;
      font-weight: 600;
    }

    .completion-card {
      margin-top: 18px;
      background: white;
      border-radius: 18px;
      border: 1px solid #e2e6ee;
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 14px 30px rgba(37, 24, 77, 0.08);
    }

    .completion-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      padding: 10px 18px;
      border-radius: 999px;
      color: white;
      font-weight: 800;
      font-size: 1.2rem;
      margin-bottom: 16px;
    }

    .completion-badge.completed { background: linear-gradient(90deg, #6f7fea, #7955c4); }
    .completion-badge.perfect { background: linear-gradient(90deg, #2fd673, #16c9d3); }

    .completion-card h2 { margin: 0 0 10px; font-size: 2rem; color: var(--text); }
    .completion-card p { margin: 0; color: #607287; font-size: 1.02rem; line-height: 1.6; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 22px 0;
    }

    .summary-item {
      background: #f7f8fb;
      border: 1px solid #e4e8ef;
      border-radius: 14px;
      padding: 14px 10px;
    }

    .summary-item .k { font-size: .85rem; text-transform: uppercase; letter-spacing: .08em; color: #7b8ba0; margin-bottom: 8px; }
    .summary-item .v { font-size: 1.8rem; font-weight: 800; }
    .summary-item.correct .v { color: #19ad5d; }
    .summary-item.incorrect .v { color: #f04d47; }
    .summary-item.score .v { color: #6d69ec; }

    .primary-btn {
      text-align: center;
      font-weight: 700;
      color: white;
      background: linear-gradient(90deg, #6f7fea 0%, #7c56c4 100%);
      border: none;
      box-shadow: 0 10px 20px rgba(97, 87, 208, 0.18);
    }

    .hidden { display: none !important; }

    @media (max-width: 640px) {
      body { padding: 0; }
      .app-shell { min-height: 100vh; border-radius: 0; width: 100%; }
      .hero { padding: 28px 18px 20px; }
      .content { padding: 20px 16px 24px; }
      .stats-panel { padding: 12px 8px; }
      .stat-label { font-size: .82rem; }
      .option-btn, .back-btn, .primary-btn { font-size: 1rem; padding: 14px; }
      .question-card { padding: 24px 16px; }
      .summary-grid { grid-template-columns: 1fr; }
    }
  

    .feedback-overlay {
      position: fixed;
      inset: 0;
      background: rgba(16, 19, 37, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
      backdrop-filter: blur(2px);
    }

    .feedback-modal {
      width: min(590px, 100%);
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(16, 19, 37, 0.28);
      padding: 28px 26px 24px;
      color: var(--text);
    }

    .feedback-title {
      margin: 0 0 22px;
      text-align: center;
      font-size: clamp(2rem, 5vw, 2.6rem);
      line-height: 1.05;
      font-weight: 900;
      color: #6a7de8;
      text-transform: uppercase;
    }

    .feedback-section {
      margin-bottom: 20px;
    }

    .feedback-section-label {
      margin: 0 0 10px;
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #7f8c8d;
      font-weight: 800;
    }

    .feedback-box {
      background: #f5f7fb;
      border-radius: 14px;
      padding: 18px 20px;
      color: #475569;
      font-size: 1rem;
      line-height: 1.55;
      border: 1px solid #edf1f7;
    }

    .feedback-actions {
      margin-top: 26px;
    }

    .feedback-next {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 1.08rem;
      font-weight: 800;
      color: #ffffff;
      background: linear-gradient(90deg, #6a7de8 0%, #6c82ea 100%);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(106, 125, 232, 0.28);
    }

    .feedback-next:hover {
      filter: brightness(1.03);
    }

  </style>
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <h1 id="game-title">Italian Verbs Quiz</h1>
      <p id="instructions">Learn Italian verbs in present, past, and future tense!</p>
      <div class="quiz-topbar" id="quiz-topbar">
        <div class="stats-panel">
          <div>
            <div class="stat-label">✓ Correctas</div>
            <div class="stat-value correct" id="correct-count">0</div>
          </div>
          <div>
            <div class="stat-label">✗ Incorrectas</div>
            <div class="stat-value incorrect" id="incorrect-count">0</div>
          </div>
          <div>
            <div class="stat-label">Preguntas</div>
            <div class="stat-value progress" id="question-count">0/100</div>
          </div>
        </div>
      </div>
      <div class="hero-separator">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </section>

    <section class="content">
      <div id="mode-selector" class="mode-grid">
        <button class="mode-card gradient-present" onclick="startQuiz('basico')">
          <div class="title">🟩 Present (Presente Indicativo)</div>
          <div class="subtitle">100 verbs - Basic tense</div>
        </button>
        <button class="mode-card gradient-past" onclick="startQuiz('pasado')">
          <div class="title">⏪ Past (Passato Prossimo)</div>
          <div class="subtitle">100 verbs - Recent past</div>
        </button>
        <button class="mode-card gradient-future" onclick="startQuiz('futuro')">
          <div class="title">⏩ Future (Futuro Semplice)</div>
          <div class="subtitle">100 verbs - Future tense</div>
        </button>
        <button class="mode-card gradient-random" onclick="startQuiz('random')">
          <div class="title">🎲 Random (Modo Aleatorio)</div>
          <div class="subtitle">100 verbs - All tenses mixed</div>
        </button>
      </div>

      <div id="quiz-mode" class="quiz-panel">
        <div id="quiz-area"></div>
        <button class="back-btn" onclick="goHome()">← Volver a menú principal</button>
      </div>
    </section>
  </main>

  <script>
    const defaultConfig = {
      game_title: "Italian Verbs Quiz",
      instructions_text: "Learn Italian verbs in present, past, and future tense!"
    };

    let config = { ...defaultConfig };
    let quizState = {
      currentQuestion: 0,
      answered: [],
      currentAnswering: false,
      currentMode: null,
      activeData: []
    };

    const verbDataBasico = [
      { id: 1,   verb: "parlo",        spanish: "Hablo",             tense: "Presente indicativo", usage: "Se usa para expresar una acción que ocurre en el presente.", example: "Parlo con il direttore. (Hablo con el director.)" },
      { id: 2,   verb: "mangio",       spanish: "Como",              tense: "Presente indicativo", usage: "Se usa para expresar una acción presente.", example: "Mangio la pizza. (Como la pizza.)" },
      { id: 3,   verb: "vado",         spanish: "Voy",               tense: "Presente indicativo", usage: "Se usa para expresar un desplazamiento en el presente.", example: "Vado al cinema. (Voy al cine.)" },
      { id: 4,   verb: "leggo",        spanish: "Leo",               tense: "Presente indicativo", usage: "Se usa para expresar una acción de lectura presente.", example: "Leggo il libro. (Leo el libro.)" },
      { id: 5,   verb: "scrivo",       spanish: "Escribo",           tense: "Presente indicativo", usage: "Se usa para expresar una acción de escritura presente.", example: "Scrivo l'email. (Escribo el correo.)" },
      { id: 6,   verb: "finisco",      spanish: "Termino",           tense: "Presente indicativo", usage: "Se usa para expresar que algo se está terminando.", example: "Finisco il progetto. (Termino el proyecto.)" },
      { id: 7,   verb: "dormo",        spanish: "Duermo",            tense: "Presente indicativo", usage: "Se usa para expresar que alguien está durmiendo.", example: "Dormo bene. (Duermo bien.)" },
      { id: 8,   verb: "bevo",         spanish: "Bebo",              tense: "Presente indicativo", usage: "Se usa para expresar una acción de beber presente.", example: "Bevo un caffè. (Bebo un café.)" },
      { id: 9,   verb: "vengo",        spanish: "Vengo",             tense: "Presente indicativo", usage: "Se usa para indicar que alguien viene.", example: "Vengo alla festa. (Vengo a la fiesta.)" },
      { id: 10,  verb: "do",           spanish: "Doy",               tense: "Presente indicativo", usage: "Se usa para expresar una acción de dar presente.", example: "Ti do il libro. (Te doy el libro.)" },
      { id: 11,  verb: "faccio",       spanish: "Hago",              tense: "Presente indicativo", usage: "Se usa para expresar una acción presente.", example: "Faccio il lavoro. (Hago el trabajo.)" },
      { id: 12,  verb: "sto",          spanish: "Estoy",             tense: "Presente indicativo", usage: "Se usa para indicar dónde se está.", example: "Sto a casa. (Estoy en casa.)" },
      { id: 13,  verb: "ho",           spanish: "Tengo",             tense: "Presente indicativo", usage: "Se usa para expresar posesión presente.", example: "Ho tempo libero. (Tengo tiempo libre.)" },
      { id: 14,  verb: "sono",         spanish: "Soy / Estoy",       tense: "Presente indicativo", usage: "Se usa para expresar un estado presente.", example: "Sono felice. (Soy feliz.)" },
      { id: 15,  verb: "canto",        spanish: "Canto",             tense: "Presente indicativo", usage: "Se usa para expresar una acción de canto presente.", example: "Canto una canzone. (Canto una canción.)" },
      { id: 16,  verb: "ballo",        spanish: "Bailo",             tense: "Presente indicativo", usage: "Se usa para expresar que se está bailando.", example: "Ballo tutta la notte. (Bailo toda la noche.)" },
      { id: 17,  verb: "gioco",        spanish: "Juego",             tense: "Presente indicativo", usage: "Se usa para expresar una acción de juego presente.", example: "Gioco a calcio. (Juego al fútbol.)" },
      { id: 18,  verb: "lavoro",       spanish: "Trabajo",           tense: "Presente indicativo", usage: "Se usa para expresar que se está trabajando.", example: "Lavoro tutto il giorno. (Trabajo todo el día.)" },
      { id: 19,  verb: "corro",        spanish: "Corro",             tense: "Presente indicativo", usage: "Se usa para expresar una acción de correr presente.", example: "Corro al parco. (Corro al parque.)" },
      { id: 20,  verb: "cammino",      spanish: "Camino",            tense: "Presente indicativo", usage: "Se usa para expresar que se está caminando.", example: "Cammino per la città. (Camino por la ciudad.)" },
      { id: 21,  verb: "guido",        spanish: "Conduzco",          tense: "Presente indicativo", usage: "Se usa para expresar una acción de conducción presente.", example: "Guido la macchina. (Conduzco el coche.)" },
      { id: 22,  verb: "volo",         spanish: "Vuelo",             tense: "Presente indicativo", usage: "Se usa para indicar que se está volando.", example: "Volo a Roma. (Vuelo a Roma.)" },
      { id: 23,  verb: "nuoto",        spanish: "Nado",              tense: "Presente indicativo", usage: "Se usa para expresar una acción de nado presente.", example: "Nuoto al mare. (Nado en el mar.)" },
      { id: 24,  verb: "suono",        spanish: "Toco (música)",     tense: "Presente indicativo", usage: "Se usa para expresar que se está tocando un instrumento.", example: "Suono il pianoforte. (Toco el piano.)" },
      { id: 25,  verb: "disegno",      spanish: "Dibujo",            tense: "Presente indicativo", usage: "Se usa para expresar que se está dibujando.", example: "Disegno un quadro. (Dibujo un cuadro.)" },
      { id: 26,  verb: "dipingo",      spanish: "Pinto",             tense: "Presente indicativo", usage: "Se usa para expresar que se está pintando.", example: "Dipingo la casa. (Pinto la casa.)" },
      { id: 27,  verb: "compro",       spanish: "Compro",            tense: "Presente indicativo", usage: "Se usa para expresar una compra presente.", example: "Compro un libro. (Compro un libro.)" },
      { id: 28,  verb: "vendo",        spanish: "Vendo",             tense: "Presente indicativo", usage: "Se usa para expresar una venta presente.", example: "Vendo la macchina. (Vendo el coche.)" },
      { id: 29,  verb: "apro",         spanish: "Abro",              tense: "Presente indicativo", usage: "Se usa para expresar que se está abriendo algo.", example: "Apro la porta. (Abro la puerta.)" },
      { id: 30,  verb: "chiudo",       spanish: "Cierro",            tense: "Presente indicativo", usage: "Se usa para expresar que se está cerrando algo.", example: "Chiudo la finestra. (Cierro la ventana.)" },
      { id: 31,  verb: "perdo",        spanish: "Pierdo",            tense: "Presente indicativo", usage: "Se usa para expresar una pérdida presente.", example: "Perdo l'occasione. (Pierdo la oportunidad.)" },
      { id: 32,  verb: "trovo",        spanish: "Encuentro",         tense: "Presente indicativo", usage: "Se usa para expresar que se ha encontrado algo.", example: "Trovo la soluzione. (Encuentro la solución.)" },
      { id: 33,  verb: "cerco",        spanish: "Busco",             tense: "Presente indicativo", usage: "Se usa para expresar que se está buscando algo.", example: "Cerco il libro. (Busco el libro.)" },
      { id: 34,  verb: "ricordo",      spanish: "Recuerdo",          tense: "Presente indicativo", usage: "Se usa para expresar que se recuerda algo.", example: "Mi ricordo di te. (Me acuerdo de ti.)" },
      { id: 35,  verb: "dimentico",    spanish: "Olvido",            tense: "Presente indicativo", usage: "Se usa para expresar que se olvida algo.", example: "Dimentico questo giorno. (Olvido este día.)" },
      { id: 36,  verb: "capisco",      spanish: "Entiendo",          tense: "Presente indicativo", usage: "Se usa para expresar que se entiende algo.", example: "Capisco tutto. (Entiendo todo.)" },
      { id: 37,  verb: "spiego",       spanish: "Explico",           tense: "Presente indicativo", usage: "Se usa para expresar que se está explicando algo.", example: "Ti spiego come funziona. (Te explico cómo funciona.)" },
      { id: 38,  verb: "insegno",      spanish: "Enseño",            tense: "Presente indicativo", usage: "Se usa para expresar que se está enseñando algo.", example: "Insegno l'italiano. (Enseño italiano.)" },
      { id: 39,  verb: "imparo",       spanish: "Aprendo",           tense: "Presente indicativo", usage: "Se usa para expresar que se está aprendiendo algo.", example: "Imparo il francese. (Aprendo francés.)" },
      { id: 40,  verb: "penso",        spanish: "Pienso",            tense: "Presente indicativo", usage: "Se usa para expresar que se está pensando en algo.", example: "Penso a te. (Pienso en ti.)" },
      { id: 41,  verb: "credo",        spanish: "Creo",              tense: "Presente indicativo", usage: "Se usa para expresar que se cree algo.", example: "Credo a quello che dici. (Creo lo que dices.)" },
      { id: 42,  verb: "desidero",     spanish: "Deseo",             tense: "Presente indicativo", usage: "Se usa para expresar un deseo presente.", example: "Desidero vederti. (Deseo verte.)" },
      { id: 43,  verb: "amo",          spanish: "Amo",               tense: "Presente indicativo", usage: "Se usa para expresar amor presente.", example: "Ti amo. (Te amo.)" },
      { id: 44,  verb: "odio",         spanish: "Odio",              tense: "Presente indicativo", usage: "Se usa para expresar odio presente.", example: "Non odio nessuno. (No odio a nadie.)" },
      { id: 45,  verb: "rido",         spanish: "Río",               tense: "Presente indicativo", usage: "Se usa para expresar que se está riendo.", example: "Rido insieme a te. (Me río contigo.)" },
      { id: 46,  verb: "piango",       spanish: "Lloro",             tense: "Presente indicativo", usage: "Se usa para expresar que se está llorando.", example: "Non piango più. (No lloro más.)" },

    // ✅ BUG CORREGIDO: "basico" ahora apunta a verbDataBasico (antes apuntaba a verbDataPresente que no existía)

    function shuffleArray(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getDatasetForMode(mode) {
      if (mode === 'basico') return [...verbDataBasico];
      if (mode === 'pasado') return [...verbDataPasado];
      if (mode === 'futuro') return [...verbDataFuturo];
      if (mode === 'random') {
        const merged = [...verbDataBasico, ...verbDataPasado, ...verbDataFuturo];
        return shuffleArray(merged).slice(0, 100);
      }
      return [...verbDataBasico];
    }

    function getRandomOptions(question, pool) {
      const options = [question];
      const remaining = pool.filter(item => item.verb !== question.verb || item.spanish !== question.spanish);
      const distractors = shuffleArray(remaining).slice(0, 3);
      options.push(...distractors);
      return shuffleArray(options);
    }

    function startQuiz(mode) {
      quizState.currentMode = mode;
      quizState.currentQuestion = 0;
      quizState.answered = [];
      quizState.currentAnswering = false;
      quizState.activeData = getDatasetForMode(mode);

      document.getElementById('mode-selector').classList.add('hidden');
      document.getElementById('quiz-mode').classList.add('active');
      document.getElementById('quiz-topbar').classList.add('active');

      updateProgress();
      renderQuestion();
    }

    function renderQuestion() {
      const question = quizState.activeData[quizState.currentQuestion];
      const options = getRandomOptions(question, quizState.activeData);
      const quizArea = document.getElementById('quiz-area');

      hideFeedbackModal();
      quizArea.innerHTML = `
        <div class="question-card">
          <div class="question-label">VERBO ITALIANO</div>
          <h2 class="verb-text">${question.verb}</h2>
        </div>
        <div class="options">
          ${options.map(opt => `
            <button
              class="option-btn"
              onclick='selectAnswer(this, ${JSON.stringify(String(opt.spanish))}, ${JSON.stringify(String(question.spanish))})'>
              ${escapeHtml(opt.spanish)}
            </button>
          `).join('')}
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }


    function selectAnswer(button, selectedSpanish, correctSpanish) {
      if (quizState.currentAnswering) return;
      quizState.currentAnswering = true;

      const question = quizState.activeData[quizState.currentQuestion];
      const buttons = Array.from(document.querySelectorAll('.option-btn'));
      buttons.forEach(btn => btn.disabled = true);

      const isCorrect = selectedSpanish === correctSpanish;
      if (isCorrect) {
        button.classList.add('correct');
      } else {
        button.classList.add('incorrect');
        const correctBtn = buttons.find(btn => btn.textContent.trim() === correctSpanish);
        if (correctBtn) correctBtn.classList.add('correct');
      }

      quizState.answered.push({ correct: isCorrect });
      updateProgress();
      showFeedbackModal(question);
    }

    function updateProgress() {
      const total = quizState.activeData.length || 100;
      const correctAnswers = quizState.answered.filter(item => item.correct).length;
      const incorrectAnswers = quizState.answered.length - correctAnswers;
      const progressCount = Math.min(quizState.answered.length, total);
      const progressPercent = total ? (progressCount / total) * 100 : 0;

      document.getElementById('correct-count').textContent = correctAnswers;
      document.getElementById('incorrect-count').textContent = incorrectAnswers;
      document.getElementById('question-count').textContent = `${progressCount}/${total}`;
      document.getElementById('progress-fill').style.width = `${progressPercent}%`;
    }

    function showFeedbackModal(question) {
      const overlay = document.getElementById('feedback-overlay');
      const title = document.getElementById('feedback-title');
      const usage = document.getElementById('feedback-usage');
      const example = document.getElementById('feedback-example');
      const nextBtn = document.getElementById('feedback-next');

      if (!overlay || !title || !usage || !example || !nextBtn || !question) {
        moveToNextQuestion();
        return;
      }

      title.textContent = String(question.verb || '').toUpperCase();
      usage.textContent = question.usage || 'Sin explicación disponible.';
      example.textContent = question.example || 'Sin ejemplo disponible.';
      overlay.hidden = false;
      document.body.style.overflow = 'hidden';

      nextBtn.onclick = () => {
        hideFeedbackModal();
        moveToNextQuestion();
      };
    }

    function hideFeedbackModal() {
      const overlay = document.getElementById('feedback-overlay');
      const nextBtn = document.getElementById('feedback-next');
      if (overlay) overlay.hidden = true;
      if (nextBtn) nextBtn.onclick = null;
      document.body.style.overflow = '';
    }

    function moveToNextQuestion() {
      quizState.currentQuestion += 1;
      quizState.currentAnswering = false;
      if (quizState.currentQuestion < quizState.activeData.length) {
        renderQuestion();
      } else {
        showCompletion();
      }
    }

    function showCompletion() {
      hideFeedbackModal();
      const total = quizState.activeData.length;
      const correctAnswers = quizState.answered.filter(item => item.correct).length;
      const incorrectAnswers = total - correctAnswers;
      const score = total ? Math.round((correctAnswers / total) * 100) : 0;
      const perfect = total > 0 && correctAnswers === total;

      const title = perfect ? 'Perfecto' : 'Completado';
      const message = perfect
        ? '¡Increíble! Respondiste correctamente todas las preguntas de este quiz.'
        : 'Terminaste el quiz. Muy bien hecho. Sigue practicando para mejorar todavía más tu puntuación.';
      const badgeClass = perfect ? 'perfect' : 'completed';

      document.getElementById('quiz-area').innerHTML = `
        <div class="completion-card">
          <div class="completion-badge ${badgeClass}">${title}</div>
          <h2>${perfect ? '¡Lo hiciste perfecto!' : '¡Quiz finalizado!'} </h2>
          <p>${message}</p>

          <div class="summary-grid">
            <div class="summary-item correct">
              <div class="k">Correctas</div>
              <div class="v">${correctAnswers}</div>
            </div>
            <div class="summary-item incorrect">
              <div class="k">Incorrectas</div>
              <div class="v">${incorrectAnswers}</div>
            </div>
            <div class="summary-item score">
              <div class="k">Puntaje</div>
              <div class="v">${score}%</div>
            </div>
          </div>

          <button class="primary-btn" onclick="restartSameMode()">Volver a intentarlo</button>
        </div>
      `;
    }

    function restartSameMode() {
      if (!quizState.currentMode) return goHome();
      startQuiz(quizState.currentMode);
    }

    function goHome() {
      quizState = {
        currentQuestion: 0,
        answered: [],
        currentAnswering: false,
        currentMode: null,
        activeData: []
      };
      document.getElementById('mode-selector').classList.remove('hidden');
      document.getElementById('quiz-mode').classList.remove('active');
      document.getElementById('quiz-topbar').classList.remove('active');
      document.getElementById('quiz-area').innerHTML = '';
      updateProgress();
    }

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('game-title').textContent = config.game_title;
      document.getElementById('instructions').textContent = config.instructions_text;
      updateProgress();
    });

    document.addEventListener('keydown', (event) => {
      const overlay = document.getElementById('feedback-overlay');
      if (event.key === 'Escape' && overlay && !overlay.hidden) {
        hideFeedbackModal();
        moveToNextQuestion();
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch((error) => {
          console.error('Service Worker registration failed:', error);
        });
      });
    }
  </script>

    <div id="feedback-overlay" class="feedback-overlay" hidden>

        <div class="feedback-section">

        </div>
        <div class="feedback-section">
          <div class="feedback-section-label">Example</div>
          <div id="feedback-example" class="feedback-box"></div>
        </div>
        <div class="feedback-actions">
          <button id="feedback-next" class="feedback-next" type="button">Next →</button>
        </div>
      </div>
    </div>
